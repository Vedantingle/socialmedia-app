<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title != null ? title + ' | SocialMedia' : 'SocialMedia'}">SocialMedia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- NAV -->
<nav class="navbar" th:fragment="navbar">
    <div class="nav-container">
        <a href="/feed" class="nav-logo">
            <i class="fas fa-bolt"></i> SocialMedia
        </a>
        <div class="nav-search">
            <form action="/explore" method="get">
                <div class="search-input-wrap">
                    <i class="fas fa-search"></i>
                    <input type="text" name="search" placeholder="Search posts..." />
                </div>
            </form>
        </div>
        <div class="nav-links" sec:authorize="isAuthenticated()">
            <a th:href="@{/feed}" title="Feed"><i class="fas fa-home"></i></a>
            <a th:href="@{/explore}" title="Explore"><i class="fas fa-compass"></i></a>
            <a th:href="@{/profile/{u}(u=${#authentication.name})}" title="Profile">
                <i class="fas fa-user"></i>
            </a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="nav-logout" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </form>
        </div>
        <div class="nav-links" sec:authorize="!isAuthenticated()">
            <a href="/login" class="btn btn-outline">Log In</a>
            <a href="/register" class="btn btn-primary">Sign Up</a>
        </div>
    </div>
</nav>

</body>
</html>
