<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register | SocialMedia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-left">
        <div class="auth-brand">
            <div class="brand-icon"><i class="fas fa-bolt"></i></div>
            <h1>SocialMedia</h1>
            <p>Join millions of people sharing their world every day.</p>
        </div>
        <div class="auth-features">
            <div class="feature"><i class="fas fa-pencil-alt"></i><span>Post your thoughts</span></div>
            <div class="feature"><i class="fas fa-user-friends"></i><span>Follow interesting people</span></div>
            <div class="feature"><i class="fas fa-fire"></i><span>Discover trending posts</span></div>
        </div>
    </div>

    <div class="auth-right">
        <div class="auth-card">
            <h2>Create account</h2>
            <p class="auth-subtitle">It's free and always will be</p>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/register}" method="post" class="auth-form" onsubmit="return validateRegister()">
                <div class="form-group">
                    <label for="fullName"><i class="fas fa-id-card"></i> Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Your full name"
                           required minlength="2" maxlength="50"/>
                </div>
                <div class="form-group">
                    <label for="username"><i class="fas fa-at"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username"
                           required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+"
                           title="Only letters, numbers and underscores"/>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="Your email address" required/>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Min 6 characters"
                           required minlength="6" id="password"/>
                </div>
                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required/>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <p class="auth-switch">
                Already have an account? <a th:href="@{/login}">Log in</a>
            </p>
        </div>
    </div>
</div>

<script>
function validateRegister() {
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;
    if (pw !== cpw) {
        alert('Passwords do not match!');
        return false;
    }
    return true;
}
</script>
</body>
</html>
