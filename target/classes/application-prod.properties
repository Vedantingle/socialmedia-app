# ========================================
# PRODUCTION PROFILE - MySQL
# To use: run with --spring.profiles.active=prod
# ========================================

# DATABASE - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/socialmediadb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your_mysql_password_here

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# Server
server.port=8080
